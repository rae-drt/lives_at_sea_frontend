version: 1
backend:
  phases:
    build:
      commands:
        - rm -rf .npm node_modules
        - npm i
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - ls
frontend:
  phases:
    build:
      commands:
        - ls
        - env
        #- env | grep '^VITE_API_ROOT=' >> .env
        - cat .env
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
