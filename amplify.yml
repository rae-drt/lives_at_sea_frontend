version: 1
backend:
  phases:
    build:
      commands:
        - node --version
        - nvm use
        - node --version
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - ls
        - node --version
frontend:
  phases:
    build:
      commands:
        - node --version
        - nvm use
        - node --version
        - ls
        - env
        - npm run build
        - node --version
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
