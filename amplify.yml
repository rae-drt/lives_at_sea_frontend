version: 1
backend:
  phases:
    build:
      commands:
        - node --version
        - nvm install #just one nvm install, as amplify always appears to run this step first
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - node --version
frontend:
  phases:
    build:
      commands:
        # An 'nvm use' or 'nvm install' here would feel safer, but seems un-needed in practice
        - node --version
        - npm run build
        - node --version
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
