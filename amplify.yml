version: 1
backend:
  phases:
    build:
      commands:
        - node --version
        - rm -rf .npm node_modules
        - npm i
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - ls
        - node --version
frontend:
  phases:
    build:
      commands:
        - node --version
        - ls
        - env
        - npm run build
        - node --version
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
