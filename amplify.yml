version: 1
backend:
  phases:
    build:
      commands:
        - rm -rf .npm
        - npm ci --cache .npm --prefer-offline
        - npm --version
        - node --version
        - ls
        - cat package-lock.json
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
